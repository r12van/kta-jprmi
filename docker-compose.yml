services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_kta_jprmi
    restart: unless-stopped
    environment:
      - SERVER_NAME=:8080
      - FRANKENPHP_CONFIG="worker ./public/index.php"
    volumes:
      - .:/app
    networks:
      - jprmi_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: nginx_kta_jprmi
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/app:ro
    networks:
      - jprmi_network
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: sim_jprmi_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: db_jprmi
      MYSQL_USER: jprmi_user
      MYSQL_PASSWORD: password_rahasia
      MYSQL_ROOT_PASSWORD: root_password_rahasia
    volumes:
      - jprmi_db_data:/var/lib/mysql
    networks:
      - jprmi_network

networks:
  jprmi_network:
    driver: bridge

volumes:
  jprmi_db_data:
