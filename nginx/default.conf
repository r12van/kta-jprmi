# Mendefinisikan zona rate limit (Mencegah serangan DDoS / Spam)
limit_req_zone $binary_remote_addr zone=jprmilimit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost; # Ganti dengan domain SIM-JPRMI jika sudah ada domain resmi

    # Root direktori diarahkan ke folder public Laravel
    root /app/public;
    index index.php index.html index.htm;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:;" always;

    # --- Pengaturan Proxy ke FrankenPHP ---
    location / {
        # Mengaktifkan Rate Limiting
        limit_req zone=jprmilimit burst=20 nodelay;

        # Coba serve file statis secara langsung via Nginx dulu.
        # Jika tidak ada, baru lempar ke FrankenPHP (app:8080)
        try_files $uri $uri/ @frankenphp;
    }

    # Blok khusus untuk melempar traffic PHP ke FrankenPHP
    location @frankenphp {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Optimasi Cache Aset Statis ---
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|eot|ttf|woff|woff2|svg)$ {
        expires max;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
        access_log off;
    }

    # --- Blokir Akses ke File Sensitif (.env, .git, dll) ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
